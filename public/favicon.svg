  <circle class="anel" cx="32" cy="32" r="20" fill="none" stroke-width="7" />
  <circle class="sombra" cx="32" cy="33.5" r="20" fill="none" stroke-width="1.2" opacity="0.9" />
  <circle class="halo" cx="32" cy="32" r="28" fill="none" stroke-width="1" opacity="0.4" />
